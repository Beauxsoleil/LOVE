<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
  />
  <meta name="theme-color" content="#0b0524" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Guess How Much I Love You</title>
  <style>
    :root {
      --bg-top: #1a0b3a;
      --bg-bottom: #05010f;
      --accent: #ff5d8f;
      --accent-2: #ffd36e;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: #05010f;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #fff;
      -webkit-user-select: none;
      user-select: none;
      overscroll-behavior: none;
    }

    #app {
      position: fixed;
      inset: 0;
      overflow: hidden;
      background:
        radial-gradient(120% 80% at 50% -10%, #3a1d6e 0%, transparent 55%),
        linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
    }

    /* ---------- Stars ---------- */
    .stars {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      border-radius: 50%;
      background: #fff;
      opacity: 0.7;
      animation: twinkle 3s infinite ease-in-out;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0.15; transform: scale(0.6); }
      50% { opacity: 0.9; transform: scale(1); }
    }

    /* ---------- Collage ---------- */
    .collage {
      position: absolute;
      inset: 0;
      padding: calc(14px + var(--safe-top)) 12px calc(14px + var(--safe-bottom));
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(96px, 1fr));
      grid-auto-rows: minmax(96px, 1fr);
      gap: 8px;
      align-content: start;
      z-index: 1;
      overflow: hidden;
    }
    @media (min-width: 700px) {
      .collage { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); grid-auto-rows: 150px; }
    }

    .tile {
      position: relative;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 6px 18px rgba(0,0,0,0.45);
      background: linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02));
      border: 1px solid rgba(255,255,255,0.08);
      transform: rotate(var(--rot, 0deg));
      animation: floaty 6s ease-in-out infinite;
      animation-delay: var(--delay, 0s);
    }
    .tile img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    /* Some tiles span 2 for a scrapbook feel */
    .tile.tall { grid-row: span 2; }
    .tile.wide { grid-column: span 2; }

    @keyframes floaty {
      0%, 100% { transform: rotate(var(--rot,0deg)) translateY(0); }
      50% { transform: rotate(var(--rot,0deg)) translateY(-4px); }
    }

    .placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      color: rgba(255,255,255,0.55);
      background:
        radial-gradient(circle at 30% 30%, rgba(255,93,143,0.35), transparent 60%),
        radial-gradient(circle at 70% 70%, rgba(120,160,255,0.35), transparent 60%),
        rgba(255,255,255,0.04);
    }

    /* Soft vignette so the center button pops */
    .vignette {
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      background: radial-gradient(60% 42% at 50% 50%, rgba(5,1,15,0.72) 0%, rgba(5,1,15,0.15) 45%, transparent 70%);
    }

    /* ---------- Center button ---------- */
    .center {
      position: absolute;
      inset: 0;
      z-index: 5;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }
    .love-btn {
      pointer-events: auto;
      position: relative;
      border: none;
      cursor: pointer;
      width: min(72vw, 260px);
      aspect-ratio: 1 / 1;
      border-radius: 50%;
      color: #fff;
      font-weight: 800;
      font-size: clamp(17px, 5.2vw, 24px);
      line-height: 1.2;
      letter-spacing: 0.2px;
      padding: 18px;
      text-shadow: 0 1px 6px rgba(0,0,0,0.4);
      background:
        radial-gradient(circle at 35% 28%, #ff9ab5 0%, var(--accent) 42%, #c62c68 100%);
      box-shadow:
        0 0 0 6px rgba(255,255,255,0.10),
        0 0 42px 6px rgba(255,93,143,0.55),
        inset 0 -10px 24px rgba(0,0,0,0.28);
      transition: transform 0.15s ease, box-shadow 0.3s ease;
      animation: pulse 2.4s ease-in-out infinite;
    }
    .love-btn:active { transform: scale(0.94); }
    .love-btn.hidden { opacity: 0; transform: scale(0.6); pointer-events: none; transition: all 0.4s ease; }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 6px rgba(255,255,255,0.10), 0 0 42px 6px rgba(255,93,143,0.45), inset 0 -10px 24px rgba(0,0,0,0.28); }
      50% { box-shadow: 0 0 0 10px rgba(255,255,255,0.06), 0 0 60px 14px rgba(255,93,143,0.75), inset 0 -10px 24px rgba(0,0,0,0.28); }
    }
    .love-btn small {
      display: block;
      font-size: 0.62em;
      font-weight: 600;
      opacity: 0.9;
      margin-top: 6px;
    }

    /* ---------- Rocket + planet ---------- */
    .rocket {
      position: absolute;
      z-index: 8;
      font-size: 44px;
      left: 0;
      top: 0;
      will-change: transform;
      transform: translate(-100px, -100px);
      pointer-events: none;
      filter: drop-shadow(0 0 12px rgba(255,210,110,0.7));
      opacity: 0;
    }
    .trail {
      position: absolute;
      z-index: 7;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,210,110,0.9), rgba(255,93,143,0.15) 70%, transparent);
      pointer-events: none;
      transform: translate(-50%, -50%);
      opacity: 0;
    }
    .planet {
      position: absolute;
      z-index: 6;
      border-radius: 50%;
      pointer-events: none;
      transform: translate(-50%, -50%) scale(0);
      transition: transform 0.5s cubic-bezier(.2,1.3,.4,1), opacity 0.4s ease;
      opacity: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .planet .ring {
      position: absolute;
      inset: -18% -34%;
      border-radius: 50%;
      border: 6px solid rgba(255,255,255,0.35);
      transform: rotate(-22deg);
    }

    /* ---------- Message ---------- */
    .message {
      position: absolute;
      z-index: 10;
      left: 50%;
      bottom: calc(9% + var(--safe-bottom));
      transform: translateX(-50%) translateY(20px);
      width: max-content;
      max-width: 88vw;
      text-align: center;
      padding: 14px 22px;
      border-radius: 22px;
      font-weight: 800;
      font-size: clamp(18px, 5.4vw, 26px);
      background: rgba(255,255,255,0.10);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.18);
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
      opacity: 0;
      transition: opacity 0.5s ease, transform 0.5s ease;
    }
    .message.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .message .sub { display:block; font-weight:600; font-size:0.62em; opacity:0.85; margin-top:4px; }

    /* Hearts burst */
    .heart {
      position: absolute;
      z-index: 9;
      font-size: 22px;
      pointer-events: none;
      transform: translate(-50%, -50%);
      opacity: 0;
    }

    /* ---------- Toolbar ---------- */
    .toolbar {
      position: absolute;
      z-index: 12;
      top: calc(10px + var(--safe-top));
      right: 12px;
      display: flex;
      gap: 8px;
    }
    .tool {
      pointer-events: auto;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.10);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      padding: 9px 13px;
      border-radius: 999px;
      cursor: pointer;
    }
    .tool:active { transform: scale(0.95); }
    #fileInput { display: none; }

    .hint {
      position: absolute;
      z-index: 3;
      left: 50%;
      top: calc(16px + var(--safe-top));
      transform: translateX(-50%);
      font-size: 12px;
      opacity: 0.75;
      text-align: center;
      width: 78%;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="stars" id="stars"></div>
    <div class="collage" id="collage"></div>
    <div class="vignette"></div>

    <p class="hint" id="hint">Tap the heart 💗</p>

    <div class="toolbar">
      <button class="tool" id="addBtn">＋ Add Photos</button>
    </div>
    <input type="file" id="fileInput" accept="image/*" multiple />

    <div class="center">
      <button class="love-btn" id="loveBtn">
        Guess how much I love you
        <small>tap me 💗</small>
      </button>
    </div>

    <div class="message" id="message"></div>
  </div>

  <script>
  (function () {
    "use strict";

    var app = document.getElementById("app");
    var collage = document.getElementById("collage");
    var loveBtn = document.getElementById("loveBtn");
    var message = document.getElementById("message");
    var hint = document.getElementById("hint");
    var addBtn = document.getElementById("addBtn");
    var fileInput = document.getElementById("fileInput");

    /* ------------------------------------------------------------------ *
     * PHOTOS
     * 1. Drop image files into the "images/" folder and list them below.
     * 2. Or just tap "Add Photos" on your phone — those are saved locally.
     * ------------------------------------------------------------------ */
    var FOLDER_PHOTOS = [
      "images/1.jpg", "images/2.jpg", "images/3.jpg", "images/4.jpg",
      "images/5.jpg", "images/6.jpg", "images/7.jpg", "images/8.jpg",
      "images/9.jpg", "images/10.jpg", "images/11.jpg", "images/12.jpg"
    ];

    var STORAGE_KEY = "love_collage_photos_v1";
    function loadSaved() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]"); }
      catch (e) { return []; }
    }
    function saveSaved(arr) {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(arr)); } catch (e) {}
    }

    /* ---------- Build the collage ---------- */
    function buildCollage() {
      collage.innerHTML = "";
      var saved = loadSaved();
      var sources = saved.slice();          // user photos first
      FOLDER_PHOTOS.forEach(function (p) { sources.push(p); });

      // Ensure the grid always looks full even with no photos.
      var minTiles = 18;
      var count = Math.max(minTiles, sources.length);

      for (var i = 0; i < count; i++) {
        var tile = document.createElement("div");
        tile.className = "tile";
        var rot = (Math.random() * 5 - 2.5).toFixed(2);
        tile.style.setProperty("--rot", rot + "deg");
        tile.style.setProperty("--delay", (Math.random() * 4).toFixed(2) + "s");
        if (i % 7 === 3) tile.classList.add("tall");
        if (i % 11 === 6) tile.classList.add("wide");

        var src = sources[i];
        if (src) {
          var img = document.createElement("img");
          img.src = src;
          img.alt = "";
          img.loading = "lazy";
          // If a folder image is missing, replace that tile with a pretty placeholder.
          img.onerror = (function (t) {
            return function () { makePlaceholder(t); };
          })(tile);
          tile.appendChild(img);
        } else {
          makePlaceholder(tile);
        }
        collage.appendChild(tile);
      }
    }

    var HEART_EMOJI = ["💗", "💖", "💘", "💝", "❤️", "🌸", "✨", "💞"];
    function makePlaceholder(tile) {
      tile.innerHTML = "";
      tile.classList.add("placeholder");
      tile.textContent = HEART_EMOJI[Math.floor(Math.random() * HEART_EMOJI.length)];
    }

    /* ---------- Add photos from the phone ---------- */
    addBtn.addEventListener("click", function () { fileInput.click(); });
    fileInput.addEventListener("change", function (e) {
      var files = Array.prototype.slice.call(e.target.files || []);
      if (!files.length) return;
      var saved = loadSaved();
      var pending = files.length;
      files.forEach(function (file) {
        var reader = new FileReader();
        reader.onload = function (ev) {
          saved.unshift(ev.target.result);
          if (saved.length > 40) saved = saved.slice(0, 40); // keep storage sane
          pending--;
          if (pending === 0) {
            saveSaved(saved);
            buildCollage();
          }
        };
        reader.onerror = function () { pending--; if (pending === 0) { saveSaved(saved); buildCollage(); } };
        reader.readAsDataURL(file);
      });
      fileInput.value = "";
    });

    /* ---------- Stars ---------- */
    (function makeStars() {
      var box = document.getElementById("stars");
      var n = 70;
      for (var i = 0; i < n; i++) {
        var s = document.createElement("div");
        s.className = "star";
        s.style.left = Math.random() * 100 + "%";
        s.style.top = Math.random() * 100 + "%";
        var size = (Math.random() * 2 + 1).toFixed(1);
        s.style.width = size + "px";
        s.style.height = size + "px";
        s.style.animationDelay = (Math.random() * 3).toFixed(2) + "s";
        box.appendChild(s);
      }
    })();

    /* ------------------------------------------------------------------ *
     * PLANETS — one is picked at random on every tap.
     * ------------------------------------------------------------------ */
    var PLANETS = [
      { name: "the Moon",  color: "radial-gradient(circle at 35% 30%, #f4f4f8, #bfc3d4)", size: 74,  ring: false, phrase: "To the Moon and back!" },
      { name: "Mars",      color: "radial-gradient(circle at 35% 30%, #ff9a6b, #c1440e)", size: 78,  ring: false, phrase: "All the way to Mars and back!" },
      { name: "Venus",     color: "radial-gradient(circle at 35% 30%, #ffe9b0, #d99a3a)", size: 84,  ring: false, phrase: "Out to Venus and back!" },
      { name: "Jupiter",   color: "radial-gradient(circle at 35% 30%, #f6d9a0, #b07b46)", size: 118, ring: false, phrase: "Past Jupiter and back!" },
      { name: "Saturn",    color: "radial-gradient(circle at 35% 30%, #f7e2a8, #c9a34e)", size: 96,  ring: true,  phrase: "Around Saturn's rings and back!" },
      { name: "Neptune",   color: "radial-gradient(circle at 35% 30%, #8fbaff, #2a4fb0)", size: 88,  ring: false, phrase: "Way out to Neptune and back!" },
      { name: "Uranus",    color: "radial-gradient(circle at 35% 30%, #bff3f0, #4fb3ab)", size: 90,  ring: true,  phrase: "Off to Uranus and back!" },
      { name: "Pluto",     color: "radial-gradient(circle at 35% 30%, #e8d5c0, #9c7a5c)", size: 62,  ring: false, phrase: "Even out to Pluto and back!" }
    ];

    var flying = false;
    var lastIndex = -1;

    function pickPlanet() {
      var idx;
      do { idx = Math.floor(Math.random() * PLANETS.length); }
      while (idx === lastIndex && PLANETS.length > 1);
      lastIndex = idx;
      return PLANETS[idx];
    }

    loveBtn.addEventListener("click", launch);

    function launch() {
      if (flying) return;
      flying = true;
      hint.style.display = "none";
      var planet = pickPlanet();

      loveBtn.classList.add("hidden");
      message.classList.remove("show");

      var W = app.clientWidth;
      var H = app.clientHeight;

      // Launch pad = center (where the button was); target planet up top somewhere.
      var startX = W / 2;
      var startY = H / 2;
      var targetX = W * (0.2 + Math.random() * 0.6);
      var targetY = H * (0.12 + Math.random() * 0.16);

      // Show planet growing in.
      var planetEl = document.createElement("div");
      planetEl.className = "planet";
      planetEl.style.width = planet.size + "px";
      planetEl.style.height = planet.size + "px";
      planetEl.style.left = targetX + "px";
      planetEl.style.top = targetY + "px";
      planetEl.style.background = planet.color;
      planetEl.style.boxShadow = "0 0 30px rgba(255,255,255,0.25), inset -8px -8px 20px rgba(0,0,0,0.4)";
      if (planet.ring) {
        var ring = document.createElement("div");
        ring.className = "ring";
        planetEl.appendChild(ring);
      }
      app.appendChild(planetEl);
      requestAnimationFrame(function () {
        planetEl.style.opacity = "1";
        planetEl.style.transform = "translate(-50%, -50%) scale(1)";
      });

      // Rocket element.
      var rocket = document.createElement("div");
      rocket.className = "rocket";
      rocket.textContent = "🚀";
      app.appendChild(rocket);

      // Control point for a nice arc (bezier).
      var ctrlX = (startX + targetX) / 2 + (Math.random() * 120 - 60);
      var ctrlY = Math.min(startY, targetY) - (120 + Math.random() * 120);

      var flightMs = 1500;
      var pauseMs = 650;
      var t0 = null;
      var phase = "out"; // out -> pause -> back
      var pauseStart = 0;

      function bez(a, b, c, t) {
        var mt = 1 - t;
        return mt * mt * a + 2 * mt * t * b + t * t * c;
      }
      // angle of rocket so its nose points along travel direction
      function setRocket(x, y, dx, dy, opacity) {
        var ang = Math.atan2(dy, dx) * 180 / Math.PI + 45; // emoji points up-right by default
        rocket.style.transform = "translate(-50%, -50%) translate(" + x + "px," + y + "px) rotate(" + ang + "deg)";
        rocket.style.opacity = opacity;
        rocket.style.left = "0px";
        rocket.style.top = "0px";
      }

      rocket.style.opacity = "1";

      var lastTrail = 0;
      function trailAt(x, y) {
        var now = performance.now();
        if (now - lastTrail < 55) return;
        lastTrail = now;
        var t = document.createElement("div");
        t.className = "trail";
        t.style.left = x + "px";
        t.style.top = y + "px";
        t.style.opacity = "0.9";
        app.appendChild(t);
        var scale = 0.6 + Math.random() * 0.8;
        requestAnimationFrame(function () {
          t.style.transition = "opacity 0.6s ease, transform 0.6s ease";
          t.style.opacity = "0";
          t.style.transform = "translate(-50%,-50%) scale(" + scale + ")";
        });
        setTimeout(function () { t.remove(); }, 650);
      }

      function frame(ts) {
        if (t0 === null) t0 = ts;
        var elapsed = ts - t0;

        if (phase === "out") {
          var t = Math.min(elapsed / flightMs, 1);
          var te = easeInOut(t);
          var x = bez(startX, ctrlX, targetX, te);
          var y = bez(startY, ctrlY, targetY, te);
          var x2 = bez(startX, ctrlX, targetX, Math.min(te + 0.01, 1));
          var y2 = bez(startY, ctrlY, targetY, Math.min(te + 0.01, 1));
          setRocket(x, y, x2 - x, y2 - y, 1);
          trailAt(x, y);
          if (t >= 1) { phase = "pause"; pauseStart = ts; }
          requestAnimationFrame(frame);
        } else if (phase === "pause") {
          // little orbit wiggle around the planet
          var p = (ts - pauseStart) / pauseMs;
          var a = p * Math.PI * 2;
          var orbitR = planet.size / 2 + 18;
          var ox = targetX + Math.cos(a) * orbitR;
          var oy = targetY + Math.sin(a) * orbitR * 0.6;
          var ox2 = targetX + Math.cos(a + 0.1) * orbitR;
          var oy2 = targetY + Math.sin(a + 0.1) * orbitR * 0.6;
          setRocket(ox, oy, ox2 - ox, oy2 - oy, 1);
          trailAt(ox, oy);
          if (p >= 1) { phase = "back"; t0 = ts; }
          requestAnimationFrame(frame);
        } else { // back
          var tb = Math.min(elapsed / flightMs, 1);
          var tbe = easeInOut(tb);
          var x = bez(targetX, ctrlX, startX, tbe);
          var y = bez(targetY, ctrlY, startY, tbe);
          var x2 = bez(targetX, ctrlX, startX, Math.min(tbe + 0.01, 1));
          var y2 = bez(targetY, ctrlY, startY, Math.min(tbe + 0.01, 1));
          setRocket(x, y, x2 - x, y2 - y, 1);
          trailAt(x, y);
          if (tb >= 1) { finish(planetEl, rocket, planet, startX, startY); return; }
          requestAnimationFrame(frame);
        }
      }

      // Reveal the message roughly when the rocket reaches the planet.
      setTimeout(function () { showMessage(planet); }, flightMs * 0.75);

      requestAnimationFrame(frame);
    }

    function easeInOut(t) {
      return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
    }

    function showMessage(planet) {
      message.innerHTML = planet.phrase +
        '<span class="sub">…and even farther than that 💗</span>';
      message.classList.add("show");
    }

    function finish(planetEl, rocket, planet, cx, cy) {
      // rocket lands: fade out, hearts burst, planet drifts away, button returns.
      rocket.style.transition = "opacity 0.4s ease";
      rocket.style.opacity = "0";
      burstHearts(cx, cy);

      setTimeout(function () {
        planetEl.style.opacity = "0";
        planetEl.style.transform = "translate(-50%,-50%) scale(0.4)";
      }, 400);

      setTimeout(function () {
        rocket.remove();
        planetEl.remove();
        loveBtn.classList.remove("hidden");
        flying = false;
      }, 900);
    }

    function burstHearts(x, y) {
      var n = 14;
      for (var i = 0; i < n; i++) {
        (function (i) {
          var h = document.createElement("div");
          h.className = "heart";
          h.textContent = HEART_EMOJI[Math.floor(Math.random() * HEART_EMOJI.length)];
          h.style.left = x + "px";
          h.style.top = y + "px";
          h.style.fontSize = (16 + Math.random() * 18) + "px";
          app.appendChild(h);
          var ang = (Math.PI * 2 * i) / n + Math.random() * 0.4;
          var dist = 90 + Math.random() * 120;
          var dx = Math.cos(ang) * dist;
          var dy = Math.sin(ang) * dist - 40;
          requestAnimationFrame(function () {
            h.style.transition = "transform 1s ease-out, opacity 1s ease-out";
            h.style.opacity = "1";
            h.style.transform = "translate(-50%,-50%) translate(" + dx + "px," + dy + "px) scale(" + (0.8 + Math.random()) + ")";
            requestAnimationFrame(function () { h.style.opacity = "0"; });
          });
          setTimeout(function () { h.remove(); }, 1100);
        })(i);
      }
    }

    /* ---------- Init ---------- */
    buildCollage();
    window.addEventListener("resize", function () { /* collage is fluid; nothing needed */ });
